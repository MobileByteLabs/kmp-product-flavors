name: Build & Test

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/development' }}

      - name: Build Plugin
        run: ./gradlew :build-logic:flavor-plugin:assemble --no-daemon

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifacts
          path: build-logic/flavor-plugin/build/libs/

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/development' }}

      - name: Run Unit Tests
        run: ./gradlew :build-logic:flavor-plugin:test --no-daemon

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build-logic/flavor-plugin/build/reports/tests/

  sample-build:
    name: Build Sample (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: [ build, test ]

    strategy:
      matrix:
        flavor: [ freeDev, paidProd ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Sample with ${{ matrix.flavor }}
        run: ./gradlew :samples:basic-flavors:assemble -PkmpFlavor=${{ matrix.flavor }} --no-daemon

      - name: Validate Flavors
        run: ./gradlew :samples:basic-flavors:validateFlavors -PkmpFlavor=${{ matrix.flavor }} --no-daemon

      - name: List Flavors
        run: ./gradlew :samples:basic-flavors:listFlavors --no-daemon

  validate:
    name: Validate Plugin
    runs-on: ubuntu-latest
    needs: [ sample-build ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3
        continue-on-error: true  # Allow build to continue if Gradle services are unreachable

      - name: Build Plugin JAR
        run: ./gradlew :build-logic:flavor-plugin:jar --no-daemon

      - name: Verify Plugin Artifacts
        run: |
          # Read version from version catalog (single source of truth)
          VERSION=$(grep 'kmpProductFlavors' gradle/libs.versions.toml | head -1 | sed 's/.*= *"\(.*\)"/\1/')
          echo "Plugin version: $VERSION"
          # Verify JAR was built
          ls -la build-logic/flavor-plugin/build/libs/
          # Verify version in JAR name
          ls build-logic/flavor-plugin/build/libs/ | grep -q "$VERSION" && echo "✅ Version $VERSION verified in JAR" || echo "⚠️ Version not found in JAR name"
