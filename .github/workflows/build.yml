name: Build & Test

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/development' }}

      - name: Build Plugin
        run: ./gradlew :build-logic:flavor-plugin:assemble --no-daemon

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-artifacts
          path: build-logic/flavor-plugin/build/libs/

  # Tests temporarily disabled - need refactoring for new class structure
  # TODO: Re-enable after test updates
  # test:
  #   name: Run Tests
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps: ...

  # integration-test:
  #   name: Integration Tests
  #   runs-on: ubuntu-latest
  #   needs: build
  #   steps: ...

  sample-build:
    name: Build Sample (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        flavor: [ freeDev, paidProd ]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Sample with ${{ matrix.flavor }}
        run: ./gradlew :sample:assemble -PkmpFlavor=${{ matrix.flavor }} --no-daemon

      - name: Validate Flavors
        run: ./gradlew :sample:validateFlavors -PkmpFlavor=${{ matrix.flavor }} --no-daemon

      - name: List Flavors
        run: ./gradlew :sample:listFlavors --no-daemon

  validate:
    name: Validate Plugin
    runs-on: ubuntu-latest
    needs: [ sample-build ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Check Plugin Publication
        run: ./gradlew :build-logic:flavor-plugin:publishToMavenLocal --no-daemon

      - name: Verify Published Artifacts
        run: |
          ls -la ~/.m2/repository/io/github/mobilebytelabs/kmpflavors/flavor-plugin/1.0.0-alpha01/
