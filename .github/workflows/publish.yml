name: Publish to Maven Central

on:
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0-alpha01)'
        required: true
        type: string

env:
  MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
  MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
  SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
  SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

jobs:
  publish:
    name: Publish Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew :build-logic:flavor-plugin:assemble --no-daemon --no-configuration-cache

      - name: Decode GPG Key
        run: |
          echo "${{ secrets.GPG_KEY_CONTENTS }}" | base64 -d > /tmp/signing-key.asc

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/signing-key.asc)
          ./gradlew :build-logic:flavor-plugin:publishAllPublicationsToMavenCentralRepository \
            --no-daemon \
            --no-configuration-cache
          rm /tmp/signing-key.asc

      - name: Create GitHub Release Notes
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build-logic/flavor-plugin/build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-gradle-plugin-portal:
    name: Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest
    needs: publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode GPG Key
        run: |
          echo "${{ secrets.GPG_KEY_CONTENTS }}" | base64 -d > /tmp/signing-key.asc

      - name: Publish to Gradle Plugin Portal
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKey=$(cat /tmp/signing-key.asc)
          ./gradlew :build-logic:flavor-plugin:publishPlugins \
            --no-daemon \
            --no-configuration-cache \
            -Pgradle.publish.key=${{ secrets.GRADLE_PUBLISH_KEY }} \
            -Pgradle.publish.secret=${{ secrets.GRADLE_PUBLISH_SECRET }}
          rm /tmp/signing-key.asc

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [ publish, publish-gradle-plugin-portal ]
    if: always()

    steps:
      - name: Check Status
        id: status
        run: |
          if [ "${{ needs.publish.result }}" == "success" ] && [ "${{ needs.publish-gradle-plugin-portal.result }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

      - name: Create Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.status.outputs.status }}" == "success" ]; then
            echo "Published successfully to:" >> $GITHUB_STEP_SUMMARY
            echo "- Maven Central" >> $GITHUB_STEP_SUMMARY
            echo "- Gradle Plugin Portal" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Installation:" >> $GITHUB_STEP_SUMMARY
            echo '```kotlin' >> $GITHUB_STEP_SUMMARY
            echo 'plugins {' >> $GITHUB_STEP_SUMMARY
            echo '    id("io.github.mobilebytelabs.kmp-product-flavors") version "${{ github.event.release.tag_name || inputs.version }}"' >> $GITHUB_STEP_SUMMARY
            echo '}' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "Release failed. Check the logs for details." >> $GITHUB_STEP_SUMMARY
          fi
